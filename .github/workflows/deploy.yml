name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/strava-dashboard
            git pull origin main

            # Restart API if backend changed
            sudo systemctl restart strava-api

            # Update dashboard files
            sudo cp -f /home/vladimir/strava-dashboard/dashboard/index.html /var/www/howisvlad.today/health/index.html 2>/dev/null || true

            echo "Deploy complete at $(date)"
