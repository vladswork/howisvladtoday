name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/strava-dashboard
            git pull origin main

            # Sync static site files
            sudo rsync -av --delete site/ /var/www/howisvlad.today/

            # Restart API
            sudo systemctl restart strava-api

            # Restart Airflow if docker-compose changed
            cd health
            docker compose --env-file /home/vladimir/strava-dashboard/.env up -d

            echo "Deployed at $(date)"
