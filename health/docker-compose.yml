version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://strava_user:${DB_PASSWORD}@host.docker.internal:5432/airflow_db
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-changeme_generate_a_real_key}
    AIRFLOW__WEBSERVER__BASE_URL: https://howisvlad.today/airflow
    # Strava env vars passed to DAGs
    STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
    STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
    STRAVA_REFRESH_TOKEN: ${STRAVA_REFRESH_TOKEN}
    STRAVA_ATHLETE_ID: ${STRAVA_ATHLETE_ID}
    DB_HOST: host.docker.internal
    DB_NAME: ${DB_NAME}
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./strava:/opt/airflow/health/strava
    - ./sync.py:/opt/airflow/health/sync.py
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --quiet requests psycopg2-binary python-dotenv &&
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Vladimir \
          --lastname S \
          --role Admin \
          --email admin@howisvlad.today \
          --password $${AIRFLOW_ADMIN_PASSWORD:-admin}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install --quiet requests psycopg2-binary python-dotenv &&
      airflow webserver --port 8080"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install --quiet requests psycopg2-binary python-dotenv &&
      airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
